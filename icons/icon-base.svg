<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Notebook (white card) -->
  <rect x="108" y="96" width="296" height="340" rx="20" fill="white" opacity="0.96"/>

  <!-- Bookmark ribbon (top-right corner of notebook) -->
  <polygon points="362,96 404,96 404,176 383,154 362,176" fill="#f97316"/>

  <!-- Notebook title lines -->
  <rect x="148" y="148" width="176" height="12" rx="6" fill="#e5e7eb"/>
  <rect x="148" y="172" width="120" height="8" rx="4" fill="#f3f4f6"/>

  <!-- Route line (blue, curved) -->
  <path d="M 168 295 Q 210 248 256 272 Q 300 296 344 250"
        stroke="#3b82f6" stroke-width="8" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Pin 1: start (blue) -->
  <circle cx="168" cy="295" r="16" fill="#3b82f6"/>
  <circle cx="168" cy="295" r="7" fill="white"/>

  <!-- Pin 2: middle (orange) -->
  <circle cx="256" cy="272" r="16" fill="#f97316"/>
  <circle cx="256" cy="272" r="7" fill="white"/>

  <!-- Pin 3: end (red) -->
  <circle cx="344" cy="250" r="16" fill="#ef4444"/>
  <circle cx="344" cy="250" r="7" fill="white"/>

  <!-- Ruled lines at bottom of notebook -->
  <rect x="148" y="352" width="216" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="148" y="372" width="180" height="5" rx="2.5" fill="#f3f4f6"/>
  <rect x="148" y="390" width="140" height="5" rx="2.5" fill="#f3f4f6"/>
</svg>
